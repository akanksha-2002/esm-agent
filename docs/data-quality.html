<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentra Research Lab | Data Quality Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }
  .header { padding: 1.25rem 2rem; border-bottom: 0.5px solid #e0e0e0; background: white; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 16px; font-weight: 500; }
  .nav { display: flex; gap: 16px; }
  .nav a { font-size: 13px; color: #888; text-decoration: none; padding: 6px 12px; border-radius: 6px; }
  .nav a:hover { color: #534AB7; }
  .nav a.active { background: #534AB7; color: white; }
  .content { max-width: 1000px; margin: 0 auto; padding: 2rem; }
  .run-btn { background: #534AB7; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; margin-bottom: 1rem; }
  .run-btn:disabled { background: #ccc; cursor: not-allowed; }
  .status { font-size: 12px; color: #999; margin-bottom: 1.5rem; }
  .score-box { background: white; border-radius: 12px; padding: 1.5rem; border: 0.5px solid #e0e0e0; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 2rem; }
  .score-circle { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: flex-end; flex-direction: column; font-size: 28px; font-weight: 600; border: 3px solid #e0e0e0; flex-shrink: 0; padding-bottom: 8px; }
  .score-circle.high { border-color: #1D9E75; color: #1D9E75; }
  .score-circle.medium { border-color: #f59e0b; color: #f59e0b; }
  .score-circle.low { border-color: #ef4444; color: #ef4444; }
  .score-label { font-size: 10px; color: #888; }
  .flags-box { background: white; border-radius: 12px; padding: 1.25rem; border: 0.5px solid #e0e0e0; margin-bottom: 1.5rem; }
  .flags-box h2 { font-size: 13px; font-weight: 600; color: #534AB7; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; }
  .flag-row { padding: 10px 0; border-bottom: 0.5px solid #f0f0f0; display: flex; gap: 12px; align-items: flex-start; }
  .flag-row:last-child { border-bottom: none; }
  .flag-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; flex-shrink: 0; }
  .flag-badge.high { background: #fee2e2; color: #ef4444; }
  .flag-badge.medium { background: #fef3c7; color: #f59e0b; }
  .flag-detail { font-size: 13px; }
  .flag-meta { font-size: 11px; color: #888; margin-top: 2px; }
  .assessment-box { background: white; border-radius: 12px; padding: 1.5rem; border: 0.5px solid #e0e0e0; }
  .assessment-box h2 { font-size: 13px; font-weight: 600; color: #534AB7; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; }
  .assessment-text { font-size: 14px; line-height: 1.8; white-space: pre-wrap; }
  .empty { color: #aaa; font-size: 14px; text-align: center; padding: 3rem; }
</style>
</head>
<body>

<div class="header">
  <h1>🛡️ Data Quality Agent</h1>
  <div class="nav">
    <a href="index.html">Dashboard</a>
    <a href="study-designer.html">Study Designer</a>
    <a href="statistician.html">Statistician</a>
    <a href="data-quality.html" class="active">Data Quality</a>
  </div>
</div>

<div class="content">
  <button class="run-btn" id="run-btn" onclick="runCheck()">▶ Run Quality Check</button>
  <p class="status" id="status">Click to analyze data quality issues in your study.</p>

  <div class="score-box" id="score-box" style="display:none">
    <div class="score-circle" id="score-circle">
      <span id="score-value">—</span>
      <span class="score-label">/10</span>
    </div>
    <div>
      <div style="font-size:16px;font-weight:500;margin-bottom:4px">Data Quality Score</div>
      <div style="font-size:13px;color:#888" id="score-summary">—</div>
    </div>
  </div>

  <div class="flags-box">
    <h2>Issues Detected</h2>
    <div id="flags-list"><div class="empty">Run quality check to detect issues</div></div>
  </div>

  <div class="assessment-box">
    <h2>Agent Assessment</h2>
    <div class="assessment-text" id="assessment-text"><div class="empty">Run quality check to see full assessment</div></div>
  </div>
</div>

<script>
const API = 'https://asia-south1-project-d7fef4ca-d9f0-4a6c-a39.cloudfunctions.net/esm-data-quality';

async function runCheck() {
  const btn = document.getElementById('run-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = '⏳ Checking...';
  status.textContent = 'Analyzing data quality...';

  try {
    const res = await fetch(API);
    const data = await res.json();

    if (data.error) {
      status.textContent = data.error;
      btn.disabled = false;
      btn.textContent = '▶ Run Quality Check';
      return;
    }

    status.textContent = `Check complete · ${data.total_responses} responses · ${data.flags_count} issues found · ${data.generated_at}`;
    renderFlags(data.flags);
    renderAssessment(data.assessment);
    extractScore(data.assessment);
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '▶ Run Quality Check';
}

function renderFlags(flags) {
  if (!flags.length) {
    document.getElementById('flags-list').innerHTML = '<div style="color:#1D9E75;font-size:13px;padding:1rem">✓ No issues detected</div>';
    return;
  }
  document.getElementById('flags-list').innerHTML = flags.map(f => `
    <div class="flag-row">
      <span class="flag-badge ${f.severity}">${f.severity}</span>
      <div>
        <div class="flag-detail"><strong>${f.type.replace(/_/g, ' ')}</strong> — ${f.detail}</div>
        <div class="flag-meta">Participant: ${f.participant} · ${f.timestamp}</div>
      </div>
    </div>
  `).join('');
}

function renderAssessment(text) {
  document.getElementById('assessment-text').textContent = text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/###/g,'');
}

function extractScore(text) {
  const match = text.match(/(\d+)\/10/);
  if (match) {
    const score = parseInt(match[1]);
    const circle = document.getElementById('score-circle');
    document.getElementById('score-value').textContent = score;
    document.getElementById('score-box').style.display = 'flex';
    circle.className = 'score-circle ' + (score >= 7 ? 'high' : score >= 4 ? 'medium' : 'low');
    document.getElementById('score-summary').textContent = score < 4 ? 'Critical issues detected — review before analysis' : score < 7 ? 'Moderate issues — some data may be unreliable' : 'Good quality — data is suitable for analysis';
  }
}
</script>
</body>
</html>
