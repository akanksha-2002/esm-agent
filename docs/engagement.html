<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentra Research Lab | Engagement Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; }
  .header { padding: 1.25rem 2rem; border-bottom: 0.5px solid #e0e0e0; background: white; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 16px; font-weight: 500; }
  .nav { display: flex; gap: 8px; }
  .nav a { font-size: 13px; color: #888; text-decoration: none; padding: 6px 12px; border-radius: 6px; }
  .nav a:hover { color: #534AB7; }
  .nav a.active { background: #534AB7; color: white; }
  .content { max-width: 1000px; margin: 0 auto; padding: 2rem; }
  .run-btn { background: #534AB7; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; margin-bottom: 1rem; }
  .run-btn:disabled { background: #ccc; cursor: not-allowed; }
  .status { font-size: 12px; color: #999; margin-bottom: 1.5rem; }
  .participant-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .participant-card { background: white; border-radius: 12px; padding: 1.25rem; border: 0.5px solid #e0e0e0; }
  .participant-card.at-risk { border-color: #f59e0b; background: #fffbeb; }
  .participant-card.active { border-color: #1D9E75; background: #f0fdf4; }
  .p-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .p-stats { font-size: 12px; color: #888; margin-bottom: 10px; }
  .compliance-bar { height: 6px; background: #f0f0f0; border-radius: 3px; margin-bottom: 8px; }
  .compliance-fill { height: 100%; border-radius: 3px; background: #1D9E75; }
  .compliance-fill.medium { background: #f59e0b; }
  .compliance-fill.low { background: #ef4444; }
  .p-label { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
  .p-label.active { background: #dcfce7; color: #1D9E75; }
  .p-label.at-risk { background: #fef3c7; color: #f59e0b; }
  .p-label.inactive { background: #fee2e2; color: #ef4444; }
  .actions-box { background: white; border-radius: 12px; padding: 1.25rem; border: 0.5px solid #e0e0e0; margin-bottom: 1.5rem; }
  .actions-box h2 { font-size: 13px; font-weight: 600; color: #534AB7; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem; }
  .action-row { padding: 12px 0; border-bottom: 0.5px solid #f0f0f0; }
  .action-row:last-child { border-bottom: none; }
  .action-trigger { font-size: 11px; color: #888; margin-bottom: 4px; }
  .action-question { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; }
  .action-meta { font-size: 11px; color: #1D9E75; }
  .empty { color: #aaa; font-size: 13px; text-align: center; padding: 2rem; }
</style>
</head>
<body>

<div class="header">
  <h1>💬 Engagement Agent</h1>
  <div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="study-designer.html">Study Designer</a>
    <a href="statistician.html">Statistician</a>
    <a href="data-quality.html">Data Quality</a>
    <a href="engagement.html" class="active">Engagement</a>
  </div>
</div>

<div class="content">
  <button class="run-btn" id="run-btn" onclick="loadData()">↻ Load Engagement Data</button>
  <p class="status" id="status">Click to load participant engagement data.</p>

  <div class="participant-grid" id="participant-grid">
    <div class="empty">Loading participants...</div>
  </div>

  <div class="actions-box">
    <h2>💬 Adaptive Follow-ups Generated</h2>
    <div id="actions-list"><div class="empty">No adaptive follow-ups yet</div></div>
  </div>
</div>

<script>
const DASHBOARD_API = 'https://asia-south1-project-d7fef4ca-d9f0-4a6c-a39.cloudfunctions.net/esm-dashboard-api';

async function loadData() {
  const btn = document.getElementById('run-btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = 'Loading...';

  try {
    const res = await fetch(DASHBOARD_API);
    const data = await res.json();
    status.textContent = 'Last updated: ' + new Date().toLocaleTimeString();
    renderParticipants(data.participants || []);
    renderActions(data.agent_actions || []);
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
  }

  btn.disabled = false;
}

function renderParticipants(participants) {
  if (!participants.length) {
    document.getElementById('participant-grid').innerHTML = '<div class="empty">No participants yet</div>';
    return;
  }

  document.getElementById('participant-grid').innerHTML = participants.map(p => {
    const rate = p.compliance_rate || 0;
    const status = rate >= 60 ? 'active' : rate >= 30 ? 'at-risk' : 'inactive';
    const label = rate >= 60 ? 'Active' : rate >= 30 ? 'At risk' : 'Inactive';
    const fillClass = rate >= 60 ? '' : rate >= 30 ? 'medium' : 'low';

    return `<div class="participant-card ${status}">
      <div class="p-name">${p.name}</div>
      <div class="p-stats">${p.prompts_answered} responses · ${rate}% compliance</div>
      <div class="compliance-bar"><div class="compliance-fill ${fillClass}" style="width:${Math.min(rate,100)}%"></div></div>
      <span class="p-label ${status}">${label}</span>
    </div>`;
  }).join('');
}

function renderActions(actions) {
  if (!actions.length) {
    document.getElementById('actions-list').innerHTML = '<div class="empty">No adaptive follow-ups generated yet — triggers when boredom ≥ 8</div>';
    return;
  }

  document.getElementById('actions-list').innerHTML = actions.map(a => `
    <div class="action-row">
      <div class="action-trigger">Triggered by: ${a.trigger}</div>
      <div class="action-question">↳ ${a.followup_question}</div>
      <div class="action-meta">${a.participant} · ${new Date(a.timestamp).toLocaleString()}</div>
    </div>
  `).join('');
}

loadData();
</script>
</body>
</html>
